<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدولي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --bg-gradient: #111111;
            --card-bg: #151515;
            --glass: rgba(10, 10, 10, 0.85);
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --accent: #00f2fe;
            --success: #00ff87;
            --chem-color: #3b82f6;
            --phys-color: #f59e0b;
            --bio-color: #10b981;
            --rev-color: #8b5cf6;
            --sol-color: #ef4444;
            --line: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Cairo', sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, var(--bg-gradient), var(--bg));
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        body.modal-open { overflow: hidden; }

        .main-title {
            text-align: center;
            padding: 50px 20px 20px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .title-text {
            background: linear-gradient(90deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .progress-section { max-width: 600px; margin: 0 auto; }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .bar-bg {
            background: #222;
            height: 12px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        #bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            width: 0%;
            border-radius: 20px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--success);
        }

        @keyframes pulse-bar {
            0% { box-shadow: 0 0 10px var(--success); filter: brightness(1); }
            50% { box-shadow: 0 0 25px var(--success), 0 0 40px var(--success); filter: brightness(1.3); }
            100% { box-shadow: 0 0 10px var(--success); filter: brightness(1); }
        }
        .pulse-animation { animation: pulse-bar 0.8s ease-out; }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .tasks-grid { display: grid; gap: 16px; margin-top: 10px; padding-bottom: 30px; }

        .day-card {
            background: var(--card-bg);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            touch-action: manipulation;
        }

        .day-card:hover {
            background: #1a1a1a;
            transform: translateY(-3px);
            border-color: #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.35);
        }

        .day-card.dragging { opacity: 0.55; transform: scale(0.99); border-style: dashed; }
        .day-card.drag-over { outline: 2px solid rgba(0,242,254,0.35); transform: translateY(-2px); }

        .day-card.done { background: rgba(0, 255, 135, 0.03); border-color: rgba(0, 255, 135, 0.2); opacity: 0.88; }
        .day-card.done .task { text-decoration: line-through; color: var(--text-dim); }

        .check-container { display: flex; align-items: center; flex-shrink: 0; }
        input[type="checkbox"] {
            appearance: none;
            width: 28px;
            height: 28px;
            border: 2px solid #444;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            background: transparent;
            transition: all 0.2s ease;
        }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        input[type="checkbox"]:checked {
            background: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.5);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: #000;
            font-size: 18px;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-weight: 900;
        }

        .content { flex-grow: 1; min-width: 0; }
        .date { font-size: 0.85rem; color: var(--accent); font-weight: 700; margin-bottom: 5px; }
        .task { font-size: 1.05rem; font-weight: 600; color: var(--text-main); line-height: 1.7; }

        .side-column { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .reorder-controls { display: flex; flex-direction: column; gap: 6px; }
        .move-btn {
            width: 34px; height: 28px; border: 1px solid #333; border-radius: 8px;
            background: #101010; color: #fff; cursor: pointer; display: grid; place-items: center;
            font-size: 14px; transition: all 0.2s ease;
        }
        .move-btn:hover { background: #1c1c1c; border-color: #444; transform: translateY(-1px); }
        .move-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
        .drag-handle { color: #6b7280; font-size: 18px; line-height: 1; cursor: grab; padding: 0 2px; }
        .drag-handle:active { cursor: grabbing; }

        .tag {
            font-size: 0.75rem; padding: 6px 14px; border-radius: 8px; font-weight: 800;
            min-width: 70px; text-align: center; color: #fff; flex-shrink: 0;
        }
        .tag-chem { background: var(--chem-color); box-shadow: 0 0 10px rgba(59,130,246,0.3); }
        .tag-phys { background: var(--phys-color); box-shadow: 0 0 10px rgba(245,158,11,0.3); }
        .tag-bio { background: var(--bio-color); box-shadow: 0 0 10px rgba(16,185,129,0.3); color: #000; }
        .tag-rev { background: var(--rev-color); box-shadow: 0 0 10px rgba(139,92,246,0.3); }
        .tag-sol { background: var(--sol-color); box-shadow: 0 0 10px rgba(239,68,68,0.3); }

        .countdown-wrap { margin-top: 30px; padding-top: 8px; }
        .countdown-title { margin: 0 0 12px; font-size: 1.05rem; color: #fff; font-weight: 900; }

        #countdownGrid {
            display: grid;
            gap: 12px;
        }

        .exam-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            direction: rtl;
            background: linear-gradient(180deg, #121212, #101010);
            border: 1px solid #262626;
            border-radius: 18px;
            padding: 14px 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.18);
        }

        .exam-meta {
            min-width: 0;
            text-align: right;
            flex: 1 1 auto;
        }

        .exam-line {
            font-weight: 900;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-main);
        }

        .exam-subject.chem { color: var(--chem-color); }
        .exam-subject.phys { color: var(--phys-color); }
        .exam-subject.bio { color: var(--bio-color); }

        .exam-date {
            margin-top: 4px;
            color: var(--text-dim);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .countdown-box {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
            direction: ltr;
            overflow-x: auto;
            padding-bottom: 2px;
            max-width: 100%;
        }

        .time-unit {
            background: #0f0f0f;
            border: 1px solid #2b2b2b;
            border-radius: 14px;
            min-width: 78px;
            padding: 10px 10px 9px;
            text-align: center;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
        }

        .time-unit[data-unit="days"] { border-color: rgba(255,77,109,0.45); }
        .time-unit[data-unit="hours"] { border-color: var(--rev-color); }
        .time-unit[data-unit="minutes"] { border-color: var(--rev-color); }
        .time-unit[data-unit="seconds"] { border-color: var(--rev-color); }

        .time-value {
            display: block;
            font-size: 1.15rem;
            font-weight: 900;
            line-height: 1.1;
        }

        .time-unit[data-unit="days"] .time-value { color: #ff7a94; }
        .time-unit[data-unit="hours"] .time-value { color: white; }
        .time-unit[data-unit="minutes"] .time-value { color: white; }
        .time-unit[data-unit="seconds"] .time-value { color: white; }

        .time-label {
            display: block;
            margin-top: 4px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .exam-count { margin-top: 10px; color: #fff; font-weight: 800; font-size: 0.9rem; line-height: 1.6; }
        .exam-card.chem .exam-line .exam-subject { color: var(--chem-color); }
        .exam-card.phys .exam-line .exam-subject { color: var(--phys-color); }
        .exam-card.bio .exam-line .exam-subject { color: var(--bio-color); }
        .hint-box { margin-top: 14px; color: var(--text-dim); font-size: 0.85rem; line-height: 1.7; }

        @media (max-width: 700px) {
            .exam-card {
                flex-direction: column;
                align-items: stretch;
            }
            .countdown-box {
                justify-content: flex-start;
            }
        }
.confirm-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 16px;
        }
        .confirm-overlay.show { display: flex; }
        .confirm-modal {
            width: min(100%, 440px); background: linear-gradient(180deg, #161616, #101010);
            border: 1px solid #2a2a2a; border-radius: 22px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.55); overflow: hidden;
        }
        .confirm-head { padding: 16px 18px 0; }
        .confirm-title { margin: 0; font-size: 1.1rem; font-weight: 900; }
        .confirm-body { padding: 10px 18px 6px; color: var(--text-dim); line-height: 1.8; font-size: 0.95rem; }
        .confirm-task { margin-top: 10px; color: #fff; font-weight: 800; line-height: 1.8; }
        .confirm-actions { display: flex; gap: 10px; padding: 16px 18px 18px; }
        .confirm-btn {
            flex: 1; border: 0; border-radius: 14px; padding: 12px 14px; font-size: 0.95rem; font-weight: 900; cursor: pointer;
        }
        .confirm-btn.cancel { background: #222; color: #fff; }
        .confirm-btn.ok { background: linear-gradient(90deg, var(--accent), var(--success)); color: #000; }

        @media (max-width: 700px) {
            .day-card { padding: 16px; gap: 12px; align-items: flex-start; }
            .side-column { align-items: flex-end; }
            .countdown-row { flex-direction: column; overflow-x: visible; }
            .exam-card { min-width: 0; }
            .countdown-box { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            .container { padding: 10px; }
            .task { font-size: 0.95rem; }
            .tag { min-width: 60px; padding: 6px 10px; }
        }
    </style>
</head>
<body>

<div class="main-title">
    <h1><span class="title-text">الدولي اللي مش عايز يستر</span> <span>&#129394;</span></h1>
</div>

<div class="sticky-header">
    <div class="progress-section">
        <div class="progress-info">
            <span>الي خلصتو</span>
            <span id="percent-val" style="color: var(--success);">0%</span>
        </div>
        <div class="bar-bg"><div id="bar-fill"></div></div>
    </div>
</div>

<div class="container">
    <div class="tasks-grid" id="taskList"></div>

    <div class="countdown-wrap">
        <h2 class="countdown-title">المتبقي علي الامتحانات</h2>
        <div id="countdownGrid"></div>
        <div class="hint-box">ملاحظة صغيرة: الترتيب بيتحفظ جوه المتصفح، والمهمة بعد التأكيد بتتقفل نهائيًا ومش هترجع.</div>
    </div>
</div>

<div class="confirm-overlay" id="confirmOverlay" aria-hidden="true">
    <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div class="confirm-head"><h3 class="confirm-title" id="confirmTitle">تأكيد المهمة</h3></div>
        <div class="confirm-body" id="confirmBody">
            <div>هل أنت متأكد إنك خلصت المهمة دي نهائيًا؟</div>
            <div class="confirm-task" id="confirmTaskText"></div>
        </div>
        <div class="confirm-actions">
            <button class="confirm-btn cancel" id="confirmCancel" type="button">إلغاء</button>
            <button class="confirm-btn ok" id="confirmOk" type="button">تأكيد</button>
        </div>
    </div>
</div>

<script>
    const fullPlan = [
        { d: "الخميس 4/16", t: "أول محاضرة لأحمد الجوهري DNA", type: "bio" },
        { d: "الجمعة 4/17", t: "مراجعة + حل DNA", type: "rev" },
        { d: "السبت 4/18", t: "هتكمل مراجعة مهو مفيش محاضرات نزلت", type: "rev" },
        { d: "الأحد 4/19", t: "نص باب الاتزان الأول | عبد الجواد", type: "chem" },
        { d: "الاثنين 4/20", t: "فيزياء: الفصل الأول | محمود مجدي", type: "phys" },
        { d: "الثلاثاء 4/21", t: "يوم حل كيمياء + فيزياء ع الي نزل", type: "sol" },
        { d: "الأربعاء 4/22", t: "نص باب الاتزان الثاني | عبد الجواد", type: "chem" },
        { d: "الخميس 4/23", t: "محاضرة RNA | أحمد الجوهري", type: "bio" },
        { d: "الجمعة 4/24", t: "مراجعة الأسبوع + اللايف", type: "rev" },
        { d: "السبت 4/25", t: "باقي مراجعة الأسبوع", type: "rev" },
        { d: "الأحد 4/26", t: "نص الفصل الرابع الأول | عبد الجواد", type: "chem" },
        { d: "الاثنين 4/27", t: "فصل 5 و 6 | محمود مجدي", type: "phys" },
        { d: "الثلاثاء 4/28", t: "حل فيزياء + كيمياء ع الي نزل", type: "sol" },
        { d: "الأربعاء 4/29", t: "نص الفصل الرابع الثاني | عبد الجواد", type: "chem" },
        { d: "الخميس 4/30", t: "فصل المناعة | أحمد الجوهري", type: "bio" },
        { d: "الجمعة 5/1", t: "مراجعة على الأسبوع + اللايف", type: "rev" },
        { d: "السبت 5/2", t: "باقي مراجعة على الأسبوع", type: "rev" },
        { d: "الأحد 5/3", t: "نص العضوية الأول | عبد الجواد", type: "chem" },
        { d: "الاثنين 5/4", t: "فصل الثاني فيزياء | محمود مجدي", type: "phys" },
        { d: "الثلاثاء 5/5", t: "مراجعة على فيزياء وكيمياء الي نزلو", type: "rev" },
        { d: "الأربعاء 5/6", t: "نص العضوية الثاني | عبد الجواد", type: "chem" },
        { d: "الخميس 5/7", t: "فصل الهرمونات | أحمد الجوهري", type: "bio" },
        { d: "الجمعة 5/8", t: "مراجعة الأسبوع + لايف", type: "rev" },
        { d: "السبت 5/9", t: "باقي مراجعة الأسبوع", type: "rev" },
        { d: "الأحد 5/10", t: "نص الباب الثاني «1» | عبد الجواد", type: "chem" },
        { d: "الاثنين 5/11", t: "فصل 7 و 8 حديثة | محمود مجدي", type: "phys" },
        { d: "الثلاثاء 5/12", t: "مراجعة محاضرات الفيزياء والكيمياء + لايف", type: "rev" },
        { d: "الأربعاء 5/13", t: "نص الباب الثاني «2» | عبد الجواد", type: "chem" },
        { d: "الخميس 5/14", t: "التكاثر ما قبل الإنسان | أحمد الجوهري", type: "bio" },
        { d: "الجمعة 5/15", t: "مراجعة الأسبوع + لايف", type: "rev" },
        { d: "السبت 5/16", t: "باقي مراجعة الأسبوع", type: "rev" },
        { d: "الأحد 5/17", t: "نص الفصل الأول «1» | عبد الجواد", type: "chem" },
        { d: "الاثنين 5/18", t: "الفصل الثالث | محمود مجدي", type: "phys" },
        { d: "الثلاثاء 5/19", t: "التكاثر في الإنسان | أحمد الجوهري", type: "bio" },
        { d: "الأربعاء 5/20", t: "نص الباب الأول «2» | عبد الجواد", type: "chem" },
        { d: "الخميس 5/21", t: "مراجعة الأسبوع", type: "rev" },
        { d: "الجمعة 5/22", t: "باقي مراجعة الأسبوع + لايف", type: "rev" },
        { d: "السبت 5/23", t: "يوم حل علي الأسبوع", type: "sol" },
        { d: "الأحد 5/24", t: "دعامه وحركه | أحمد الجوهري", type: "bio" },
        { d: "الاثنين 5/25", t: "فصل رابع فيزياء | محمود مجدي", type: "phys" }
    ].map((item, idx) => ({ ...item, id: `task-${String(idx + 1).padStart(2, '0')}` }));

    const STORAGE_KEY = 'studyPlanStateV4';
    const LEGACY_KEY = 'fullPlanProgress';

    const exams = [
        { id: 'chem', name: 'الكيمياء', dateText: '2/7/2026 الساعة 6:00 صباحًا', target: new Date(2026, 6, 2, 6, 0, 0) },
        { id: 'phys', name: 'الفيزياء', dateText: '9/7/2026 الساعة 6:00 صباحًا', target: new Date(2026, 6, 9, 6, 0, 0) },
        { id: 'bio', name: 'الأحياء', dateText: '16/7/2026 الساعة 6:00 صباحًا', target: new Date(2026, 6, 16, 6, 0, 0) }
    ];

    const listContainer = document.getElementById('taskList');
    const countdownGrid = document.getElementById('countdownGrid');
    const fill = document.getElementById('bar-fill');
    const percentText = document.getElementById('percent-val');
    const confirmOverlay = document.getElementById('confirmOverlay');
    const confirmTaskText = document.getElementById('confirmTaskText');
    const confirmOk = document.getElementById('confirmOk');
    const confirmCancel = document.getElementById('confirmCancel');

    const state = loadState();
    let draggedId = null;
    let pendingTaskId = null;
    let pendingCheckbox = null;

    function loadState() {
        const defaultState = { order: fullPlan.map(item => item.id), done: {} };
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
            if (saved && Array.isArray(saved.order) && saved.done && typeof saved.done === 'object') {
                const order = saved.order.filter(id => fullPlan.some(task => task.id === id));
                const missing = fullPlan.map(task => task.id).filter(id => !order.includes(id));
                return { order: [...order, ...missing], done: saved.done };
            }
        } catch (e) {}
        try {
            const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY) || '{}');
            if (legacy && typeof legacy === 'object') {
                const done = {};
                Object.keys(legacy).forEach(key => {
                    const idx = Number(key);
                    if (legacy[key] && Number.isInteger(idx) && fullPlan[idx]) done[fullPlan[idx].id] = true;
                });
                return { ...defaultState, done };
            }
        } catch (e) {}
        return defaultState;
    }

    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function orderedTasks() { const map = new Map(fullPlan.map(task => [task.id, task])); return state.order.map(id => map.get(id)).filter(Boolean); }
    function getTagLabel(type) { const labels = { chem: 'كيمياء', phys: 'فيزياء', bio: 'أحياء', rev: 'مراجعة', sol: 'حل' }; return labels[type] || 'مهمة'; }

    function updateProgress(shouldAnimate) {
        const total = fullPlan.length;
        const doneCount = fullPlan.filter(task => state.done[task.id]).length;
        const percentage = total > 0 ? Math.round((doneCount / total) * 100) : 0;
        fill.style.width = percentage + '%';
        percentText.innerText = percentage + '%';
        if (shouldAnimate) {
            fill.classList.remove('pulse-animation');
            void fill.offsetWidth;
            fill.classList.add('pulse-animation');
        }
    }

    function moveTask(taskId, direction) {
        const index = state.order.indexOf(taskId);
        if (index === -1) return;
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= state.order.length) return;
        const nextOrder = [...state.order];
        [nextOrder[index], nextOrder[newIndex]] = [nextOrder[newIndex], nextOrder[index]];
        state.order = nextOrder;
        saveState();
        render(true);
    }

    function openConfirm(taskId, checkboxEl) {
        if (state.done[taskId]) {
            if (checkboxEl) checkboxEl.checked = true;
            return;
        }
        const task = fullPlan.find(t => t.id === taskId);
        pendingTaskId = taskId;
        pendingCheckbox = checkboxEl || null;
        confirmTaskText.textContent = `${task?.d || ''} — ${task?.t || ''}`;
        confirmOverlay.classList.add('show');
        confirmOverlay.setAttribute('aria-hidden', 'false');
        document.body.classList.add('modal-open');
    }

    function closeConfirm(resetCheckbox = false) {
        if (resetCheckbox && pendingCheckbox) pendingCheckbox.checked = false;
        pendingTaskId = null;
        pendingCheckbox = null;
        confirmOverlay.classList.remove('show');
        confirmOverlay.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('modal-open');
    }

    function setDone(taskId) {
        if (state.done[taskId]) return false;
        state.done[taskId] = true;
        saveState();
        render(true);
        return true;
    }

    function renderTasks() {
        listContainer.innerHTML = '';
        orderedTasks().forEach((item, index, arr) => {
            const isDone = !!state.done[item.id];
            const card = document.createElement('div');
            card.className = `day-card ${isDone ? 'done' : ''}`;
            card.draggable = true;
            card.dataset.id = item.id;
            card.innerHTML = `
                <div class="check-container"><input type="checkbox" ${isDone ? 'checked disabled' : ''} aria-label="تحديد المهمة"></div>
                <div class="content">
                    <div class="date">${item.d}</div>
                    <div class="task">${item.t}</div>
                </div>
                <div class="side-column">
                    <span class="tag tag-${item.type}">${getTagLabel(item.type)}</span>
                    <div class="reorder-controls">
                        <button class="move-btn up" type="button" ${index === 0 ? 'disabled' : ''} aria-label="تحريك لأعلى">▲</button>
                        <button class="move-btn down" type="button" ${index === arr.length - 1 ? 'disabled' : ''} aria-label="تحريك لأسفل">▼</button>
                    </div>
                    <div class="drag-handle" title="اسحب للتغيير">⋮⋮</div>
                </div>
            `;
            const checkbox = card.querySelector('input[type="checkbox"]');
            const btnUp = card.querySelector('.move-btn.up');
            const btnDown = card.querySelector('.move-btn.down');
            checkbox.addEventListener('click', e => e.stopPropagation());
            checkbox.addEventListener('change', () => { if (!state.done[item.id]) openConfirm(item.id, checkbox); });
            btnUp.addEventListener('click', e => { e.stopPropagation(); moveTask(item.id, -1); });
            btnDown.addEventListener('click', e => { e.stopPropagation(); moveTask(item.id, 1); });
            card.addEventListener('click', e => { if (e.target.closest('button') || e.target.closest('input')) return; openConfirm(item.id, checkbox); });
            card.addEventListener('dragstart', () => { draggedId = item.id; card.classList.add('dragging'); });
            card.addEventListener('dragend', () => { draggedId = null; card.classList.remove('dragging'); document.querySelectorAll('.day-card.drag-over').forEach(el => el.classList.remove('drag-over')); });
            card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
            card.addEventListener('dragleave', () => { card.classList.remove('drag-over'); });
            card.addEventListener('drop', e => {
                e.preventDefault();
                card.classList.remove('drag-over');
                if (!draggedId || draggedId === item.id) return;
                const nextOrder = state.order.filter(id => id !== draggedId);
                const targetIndex = nextOrder.indexOf(item.id);
                nextOrder.splice(targetIndex, 0, draggedId);
                state.order = nextOrder;
                saveState();
                render(true);
            });
            listContainer.appendChild(card);
        });
    }

    function pad2(value) { return String(value).padStart(2, '0'); }
    function formatCountdown(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        return {
            days: Math.floor(totalSeconds / 86400),
            hours: Math.floor((totalSeconds % 86400) / 3600),
            minutes: Math.floor((totalSeconds % 3600) / 60),
            seconds: totalSeconds % 60
        };
    }

    function renderCountdown() {
        countdownGrid.innerHTML = '';
        exams.forEach(exam => {
            const card = document.createElement('div');
            card.className = `exam-card ${exam.id}`;
            card.innerHTML = `
                <div class="exam-meta">
                    <div class="exam-line">المتبقي على امتحان <span class="exam-subject ${exam.id}">${exam.name}</span></div>
                    <div class="exam-date">${exam.dateText}</div>
                </div>
                <div class="countdown-box">
                    <div class="time-unit" data-unit="days"><span class="time-value" data-slot="days">00</span><span class="time-label">يوم</span></div>
                    <div class="time-unit" data-unit="hours"><span class="time-value" data-slot="hours">00</span><span class="time-label">س</span></div>
                    <div class="time-unit" data-unit="minutes"><span class="time-value" data-slot="minutes">00</span><span class="time-label">د</span></div>
                    <div class="time-unit" data-unit="seconds"><span class="time-value" data-slot="seconds">00</span><span class="time-label">ث</span></div>
                </div>
            `;
            countdownGrid.appendChild(card);
            exam.node = {
                days: card.querySelector('[data-slot="days"]'),
                hours: card.querySelector('[data-slot="hours"]'),
                minutes: card.querySelector('[data-slot="minutes"]'),
                seconds: card.querySelector('[data-slot="seconds"]')
            };
        });
    }

    function updateCountdown() {
        const now = new Date();
        exams.forEach(exam => {
            const diff = exam.target.getTime() - now.getTime();
            const node = exam.node;
            if (!node) return;
            if (diff <= 0) {
                node.days.textContent = '00';
                node.hours.textContent = '00';
                node.minutes.textContent = '00';
                node.seconds.textContent = '00';
                return;
            }
            const { days, hours, minutes, seconds } = formatCountdown(diff);
            node.days.textContent = pad2(days);
            node.hours.textContent = pad2(hours);
            node.minutes.textContent = pad2(minutes);
            node.seconds.textContent = pad2(seconds);
        });
    }

    function render(animateProgress = false) {
        renderTasks();
        renderCountdown();
        updateProgress(animateProgress);
        updateCountdown();
    }

    confirmOk.addEventListener('click', () => {
        if (!pendingTaskId) return;
        setDone(pendingTaskId);
        closeConfirm(false);
    });
    confirmCancel.addEventListener('click', () => closeConfirm(true));
    confirmOverlay.addEventListener('click', (e) => { if (e.target === confirmOverlay) closeConfirm(true); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && confirmOverlay.classList.contains('show')) closeConfirm(true); });

    render(false);
    setInterval(updateCountdown, 1000);
</script>
</body>
</html>
